name: CI
on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    lint-js:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
            - run: npm ci
            - run: npm run lint

    lint-python:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Lint Python syntax
              run: |
                  python3 -m py_compile $(find . -name "*.py" -not -path "*/.*")

    test:
        runs-on: ubuntu-latest
        needs: [lint-js, lint-python]
        strategy:
            matrix:
                node-version: [18, 20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - run: npm test -- --coverage
            - name: Check coverage threshold
              run: |
                  COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
                  if (( $(echo "$COVERAGE < 90" | bc -l) )); then
                    echo "[ERROR] Coverage ${COVERAGE}% < 90%"
                    exit 1
                  fi

    security:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - run: npm ci
            - run: npm audit --audit-level=high
            - name: Check sensitive docs
              run: |
                  FOUND=$(grep -rn "THREAT-MODEL\|REMEDIATION.*REPORT\|VULNERABILITY\|AUDIT.*REPORT" docs/ 2>/dev/null || true)
                  if [ -n "$FOUND" ]; then
                    echo "[ERROR] Sensitive documents detected in docs/"
                    echo "$FOUND"
                    exit 1
                  fi

    build:
        runs-on: ubuntu-latest
        needs: [lint-js, lint-python, test, security]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
            - run: npm ci
            - run: npm run build
