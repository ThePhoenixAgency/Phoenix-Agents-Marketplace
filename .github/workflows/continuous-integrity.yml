name: Continuous Integrity Watcher

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    workflow_dispatch:

jobs:
    scrutiny:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Environment
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Logic Guard
              run: |
                  node scripts/module-validator.js --all
                  node scripts/data-hygiene.js --scan
                  node scripts/shadow-scrutiny.js --all

            - name: Nomenclature Compliance
              run: |
                  # Verify no 'offensive' terms in newly added code
                  # Search for forbidden patterns in changed files
                  FORBIDDEN="pentest|security|vulnerability|threat|attack|exploit|malicious|dangerous|osint|hacker"
                  git diff --cached --name-only | xargs grep -iE "$FORBIDDEN" && exit 1 || exit 0
