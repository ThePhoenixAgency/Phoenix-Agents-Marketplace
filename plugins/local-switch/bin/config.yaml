# Configuration du Proxy Router Local
# Created: 2026-02-18
# Last Updated: 2026-02-18
#
# Ajoutez vos backends ici. Formats supportes : anthropic, openai.
# Pour les tokens, preferez token_env (variable d'environnement) a token (en dur).

default_backend: cloud
control_key: "proxy-key"
proxy_port: 9999

timeouts:
  health_check: 2.0
  model_list: 3.0
  proxy_request: 60.0

backends:
  cloud:
    url: "https://api.anthropic.com"
    format: anthropic
    token_env: "ANTHROPIC_API_KEY"
    description: "Claude Cloud Officiel"

  ollama:
    url: "http://localhost:11434/v1"
    format: openai
    token: "ollama"
    description: "Ollama Local (Port 11434)"

  lmstudio:
    url: "http://localhost:1234/v1"
    format: openai
    token: "lmstudio"
    description: "LM Studio Local (Port 1234)"
